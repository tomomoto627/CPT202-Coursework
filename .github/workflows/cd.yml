name: CD

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          missing=0
          [ -z "$DEPLOY_HOST" ] && echo "Missing DEPLOY_HOST" && missing=1
          [ -z "$DEPLOY_USER" ] && echo "Missing DEPLOY_USER" && missing=1
          [ -z "$DEPLOY_PATH" ] && echo "Missing DEPLOY_PATH" && missing=1
          [ -z "$DEPLOY_SSH_KEY" ] && echo "Missing DEPLOY_SSH_KEY" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Please configure repository secrets before running CD."
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: mvn -B package -DskipTests

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "target/*.jar,frontend/dist/*"
          target: "${{ secrets.DEPLOY_PATH }}/upload"
          strip_components: 0

      - name: Restart service on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH/backend" "$DEPLOY_PATH/frontend" "$DEPLOY_PATH/upload"
            cp "$DEPLOY_PATH"/upload/target/*.jar "$DEPLOY_PATH/backend/app.jar"
            rm -rf "$DEPLOY_PATH/frontend"/*
            cp -r "$DEPLOY_PATH"/upload/frontend/dist/* "$DEPLOY_PATH/frontend/"
            systemctl restart coursework3
            systemctl reload nginx
            systemctl is-active coursework3
